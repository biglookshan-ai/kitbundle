<svg viewBox="0 0 1600 900" width="1600" height="900" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" role="img">
  <title>KitBundle feature banner</title>
  <desc>Marketing banner: bundles, add-ons and free gifts with automatic discounts.</desc>

  <!-- background -->
  <rect width="1600" height="900" fill="#FBFAF6"/>
  <rect x="900" y="0" width="700" height="900" fill="#FFD64A"/>
  <path d="M900 0 L1010 0 L900 900 L900 900 Z" fill="#FBFAF6"/>

  <!-- ===== LEFT: brand + message ===== -->
  <!-- logo -->
  <rect x="96" y="92" width="60" height="60" rx="14" fill="#F5C518"/>
  <g stroke="#E8890B" stroke-width="4.5" stroke-linejoin="round" stroke-linecap="round" fill="#ffffff">
    <path d="M126 106 L146 116 L146 138 L126 148 L106 138 L106 116 Z"/>
    <path d="M106 116 L126 126 L146 116" fill="none"/>
    <path d="M126 126 L126 148" fill="none"/>
  </g>
  <text x="172" y="133" font-size="34" font-weight="800" fill="#1A1A1A" letter-spacing="-0.5">KitBundle</text>

  <!-- headline -->
  <text x="96" y="360" font-size="88" font-weight="800" fill="#161616" letter-spacing="-2">Bundles, add-ons</text>
  <text x="96" y="452" font-size="88" font-weight="800" fill="#161616" letter-spacing="-2">&amp; free gifts</text>

  <!-- subheadline -->
  <text x="98" y="524" font-size="31" font-weight="500" fill="#5B5B5B">Discounted automatically at checkout —</text>
  <text x="98" y="566" font-size="31" font-weight="500" fill="#5B5B5B">no code, works on any plan.</text>

  <!-- feature pills -->
  <g font-size="23" font-weight="700">
    <rect x="96" y="626" width="214" height="56" rx="28" fill="#EAF1FF"/>
    <text x="203" y="662" fill="#2B44FF" text-anchor="middle">Bundle &amp; save</text>
    <rect x="326" y="626" width="176" height="56" rx="28" fill="#E7F6EC"/>
    <text x="414" y="662" fill="#1A7F37" text-anchor="middle">Free gift</text>
    <rect x="518" y="626" width="238" height="56" rx="28" fill="#FDE7E7"/>
    <text x="637" y="662" fill="#D23A3A" text-anchor="middle">Limited-time deals</text>
  </g>

  <!-- ===== RIGHT: bundle card mockup ===== -->
  <g>
    <!-- card -->
    <rect x="1000" y="150" width="500" height="600" rx="26" fill="#ffffff"/>
    <rect x="1000" y="150" width="500" height="600" rx="26" fill="none" stroke="#2B44FF" stroke-width="3"/>

    <!-- header row -->
    <text x="1036" y="220" font-size="30" font-weight="800" fill="#1A1A1A">Bundle &amp; Save</text>
    <rect x="1300" y="196" width="164" height="40" rx="20" fill="#E23D3D"/>
    <text x="1382" y="223" font-size="21" font-weight="800" fill="#ffffff" text-anchor="middle">45% OFF</text>

    <!-- status chips -->
    <rect x="1036" y="250" width="150" height="34" rx="17" fill="#FDE7E7"/>
    <text x="1111" y="273" font-size="17" font-weight="700" fill="#C0392B" text-anchor="middle">Ends in 5d</text>
    <rect x="1200" y="250" width="120" height="34" rx="17" fill="#E7F6EC"/>
    <text x="1260" y="273" font-size="17" font-weight="700" fill="#1A7F37" text-anchor="middle">16 in stock</text>

    <!-- product thumbnails -->
    <g>
      <rect x="1036" y="308" width="120" height="120" rx="16" fill="#F1F1EE"/>
      <rect x="1058" y="352" width="76" height="44" rx="8" fill="#2E2E2E"/>
      <circle cx="1096" cy="374" r="13" fill="#4A4A4A"/>

      <rect x="1172" y="308" width="120" height="120" rx="16" fill="#F1F1EE"/>
      <rect x="1198" y="336" width="68" height="64" rx="10" fill="none" stroke="#2E2E2E" stroke-width="7"/>

      <rect x="1308" y="308" width="120" height="120" rx="16" fill="#F1F1EE"/>
      <rect x="1332" y="340" width="72" height="56" rx="8" fill="#3A3A3A"/>
      <rect x="1344" y="352" width="30" height="14" rx="3" fill="#EDEDED"/>
    </g>

    <!-- price -->
    <text x="1036" y="500" font-size="26" font-weight="500" fill="#9A9A9A" text-decoration="line-through">$567.00</text>
    <text x="1036" y="556" font-size="48" font-weight="800" fill="#2B44FF">$311.85</text>
    <rect x="1300" y="512" width="164" height="46" rx="12" fill="#E7F6EC"/>
    <text x="1382" y="543" font-size="21" font-weight="800" fill="#1A7F37" text-anchor="middle">Save $255</text>

    <!-- free gift chip -->
    <rect x="1036" y="588" width="428" height="52" rx="12" fill="#FFF6E6" stroke="#F1D08A" stroke-width="1.5"/>
    <rect x="1052" y="600" width="28" height="28" rx="6" fill="#F5C518"/>
    <path d="M1066 600 v28 M1052 612 h28" stroke="#E8890B" stroke-width="3"/>
    <text x="1094" y="621" font-size="21" font-weight="700" fill="#8A6D00">Free gift included</text>
    <text x="1448" y="621" font-size="21" font-weight="800" fill="#1A7F37" text-anchor="end">$0</text>

    <!-- CTA -->
    <rect x="1036" y="664" width="428" height="58" rx="14" fill="#2B44FF"/>
    <text x="1250" y="701" font-size="23" font-weight="700" fill="#ffffff" text-anchor="middle">Add bundle to cart</text>
  </g>
</svg>
