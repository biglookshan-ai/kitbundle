# Learn more about configuring your app at https://shopify.dev/docs/apps/tools/cli/configuration

name = "KitBundle"
application_url = "https://addon-discount-production-bb4d.up.railway.app"
embedded = true
client_id = "f7b9d6e29086498ce53bd02ed0d8ff44"

[access_scopes]
# read/write_products: read + write the offer config product metafield.
# write_discounts: create the automatic discount that activates the Function.
scopes = "read_products,write_products,write_discounts"
use_legacy_install_flow = false

[webhooks]
api_version = "2026-10"

  [[webhooks.subscriptions]]
  uri = "/webhooks/app/uninstalled"
  topics = [ "app/uninstalled" ]

  [[webhooks.subscriptions]]
  uri = "/webhooks/app/scopes_update"
  topics = [ "app/scopes_update" ]

  [[webhooks.subscriptions]]
  uri = "/webhooks/compliance"
  compliance_topics = [ "customers/data_request", "customers/redact", "shop/redact" ]

[auth]
redirect_urls = [
  "https://addon-discount-production-bb4d.up.railway.app/auth/callback",
  "https://addon-discount-production-bb4d.up.railway.app/auth/shopify/callback",
  "https://addon-discount-production-bb4d.up.railway.app/api/auth/callback"
]

[build]
# Pinned to the Railway-hosted app; local `shopify app dev` must not rewrite it.
automatically_update_urls_on_dev = false
