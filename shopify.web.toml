name = "remix"
roles = ["frontend", "backend"]
webhooks_path = "/webhooks/app/uninstalled"

[commands]
predev = "npx prisma generate"
# db push (not migrate deploy): local sqlite has no migration history; the
# checked-in migrations are postgres-only and are used in production instead.
dev = "npx prisma db push --accept-data-loss && npx remix vite:dev"
